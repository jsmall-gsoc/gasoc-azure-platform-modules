name: Generate Module Index

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'modules/**/README.md'
      - 'modules/*/main.tf'
      - 'modules/*/variables.tf'
      - 'modules/*/outputs.tf'
      - 'scripts/generate-module-index.sh'
  workflow_dispatch:

jobs:
  generate-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make script executable
        run: chmod +x ./scripts/generate-module-index.sh

      - name: Generate MODULE_INDEX.md
        run: ./scripts/generate-module-index.sh

      - name: Check if index changed
        id: check-changes
        run: |
          if git diff --exit-code MODULE_INDEX.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Index was updated"
          fi

      - name: Create Pull Request
        if: steps.check-changes.outputs.changed == 'true' && github.event_name != 'workflow_dispatch'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'docs: auto-generate MODULE_INDEX.md'
          title: 'docs: Update MODULE_INDEX.md with latest modules'
          body: |
            # Automated MODULE_INDEX Update

            This PR automatically updates the MODULE_INDEX.md file based on the current module structure.

            ## Changes
            - Updated module count and timestamp
            - Synced with latest module definitions

            **Auto-generated by:** `scripts/generate-module-index.sh`
          branch: 'docs/update-module-index'
          delete-branch: true
          labels: 'documentation,automated'

      - name: Commit changes (manual workflow dispatch)
        if: steps.check-changes.outputs.changed == 'true' && github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add MODULE_INDEX.md
          git commit -m "docs: auto-generate MODULE_INDEX.md [skip ci]"
          git push

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.check-changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📋 **Module Index Updated**: The MODULE_INDEX.md has been regenerated with the latest modules. Please review the changes.'
            })
