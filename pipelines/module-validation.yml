trigger:
  branches:
    include:
      - main
      - develop
      - feature/*

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  TF_VERSION: '1.8.5'

stages:
- stage: Validate
  displayName: Validate Terraform Modules
  jobs:
  - job: TerraformValidation
    displayName: Terraform fmt, validate, lint, docs, and security scan
    steps:
    - checkout: self
      persistCredentials: true

    - task: Bash@3
      displayName: Install Terraform
      inputs:
        targetType: inline
        script: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
          wget https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip
          unzip terraform_${TF_VERSION}_linux_amd64.zip
          sudo mv terraform /usr/local/bin/
          terraform version

    - task: Bash@3
      displayName: Terraform fmt check
      inputs:
        targetType: inline
        script: |
          terraform fmt -check -recursive

    - task: Bash@3
      displayName: Terraform validate modules
      inputs:
        targetType: inline
        script: |
          set -e
          for d in modules/*; do
            if [ -f "$d/main.tf" ]; then
              echo "Validating $d"
              cd "$d"
              terraform init -backend=false
              terraform validate
              cd -
            fi
          done

    - task: Bash@3
      displayName: Install tflint
      inputs:
        targetType: inline
        script: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --version

    - task: Bash@3
      displayName: Run tflint
      continueOnError: true
      inputs:
        targetType: inline
        script: |
          tflint --init
          for d in modules/*; do
            if [ -f "$d/main.tf" ]; then
              echo "Linting $d"
              tflint --chdir="$d"
            fi
          done

    - task: Bash@3
      displayName: Checkov scan
      continueOnError: true
      inputs:
        targetType: inline
        script: |
          pip install checkov
          checkov -d .

    - task: Bash@3
      displayName: Trivy IaC scan
      continueOnError: true
      inputs:
        targetType: inline
        script: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy config .

    - task: Bash@3
      displayName: Terraform docs check
      continueOnError: true
      inputs:
        targetType: inline
        script: |
          curl -sSLo ./terraform-docs.tar.gz https://terraform-docs.io/dl/v0.17.0/terraform-docs-v0.17.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/
          for d in modules/*; do
            if [ -f "$d/main.tf" ]; then
              echo "Generating docs for $d"
              terraform-docs markdown table "$d" > /tmp/module-docs.md
            fi
          done

    - task: Bash@3
      displayName: Secret scan placeholder
      continueOnError: true
      inputs:
        targetType: inline
        script: |
          echo "Add Microsoft Security DevOps or Gitleaks task here."
